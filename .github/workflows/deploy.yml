name: Deploy to GitHub Pages

# Publishes the game to a gh-pages branch on every push to main. The
# branch-based flow is used (rather than actions/deploy-pages) because
# creating the Pages site via the modern API requires permissions the
# default GITHUB_TOKEN doesn't have on a fresh repo, whereas pushing a
# gh-pages branch auto-enables Pages with no manual settings step.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir site
          cp index.html site/
          # .nojekyll skips the Jekyll build step; this is a plain static file
          touch site/.nojekyll
          cd site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
